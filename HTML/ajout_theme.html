<!DOCTYPE html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css" type="text/css">
  <title>Ajouter un thème</title>
</head>

<body>
  <h1 class="form-title">Ajouter un thème</h1>
  <form action="ajouter_theme.php" method="post">
    <label for="nom">Nom</label>
    <input id="nom" type="text" name="nom" maxlength="30" size="30" required/>
    <label for="descriptif">Descriptif</label>
    <textarea id="descriptif" name="descriptif" rows="3" cols="30" placeholder="saisir un theme" required></textarea>
    <div>
      <input type="submit" value="OK">
    </div>
  </form>
</body>
</html>
